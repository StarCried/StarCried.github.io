<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <meta name="renderer" content="webkit">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
        <title>首页 - 这是一个博客(≧ω≦)/</title>
        <meta name="keywords" content="博客，好哦，好耶，好呢，好嗯">
        <link rel="stylesheet" type="text/css" href="/css/base.css">
        <link rel="stylesheet" type="text/css" href="/css/index.css">
        <link rel="stylesheet" type="text/css" href="/css/rotating_box.css">
        <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.3/dist/jquery.min.js"></script>
        <script src="https://api.ixiaowai.cn/ylapi/index.php/?code=js"></script>
        <script>
            $(function(){
                $.get("/blog/index.json", function(data){
                    for(let key in data)
                        $(".column.middle").prepend("<div class=\"card\"><div class=\"title\"><a href=\"/blog/?pid=" + key + "\"><h2>" + data[key]["title"] + "</h2></a><p><em>时间："+ data[key]["mtime"] + "</em></p></div><div class=\"content\"><p>" + data[key]["abstract"] + "</p></div></div>");
                });
                $(".header").load("/html/header");
                $(".topnav").load("/html/topnav");
                $(".footer").load("/html/footer");
            });
        </script>
    </head>
    
    <body>
        <div class="header"></div>
        <div class="topnav"></div>
        <div class="mainpage">
            <div class="column side">
                <div class="ylcard">
                    <h2>一言</h2>
                    <p><script>xiaowai();</script></p>
                </div>
            </div>
            <div class="column middle"></div>
            <div class="column side">
                <div class="playbox">
                    <div class="face a"></div>
                    <div class="face b"></div>
                    <div class="face c"></div>
                    <div class="face d"></div>
                    <div class="face e"></div>
                    <div class="face f"></div>
                </div>
            </div>
        </div>
        <div class="footer"></div>
    </body>
</html>
