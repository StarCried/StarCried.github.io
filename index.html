<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
        <title>首页 - 这是一个博客(≧ω≦)/</title>
        <meta content="博客，好哦，好耶，好呢，好嗯" name="keywords">
        <link rel="stylesheet" type="text/css" href="/css/base.css">
        <link rel="stylesheet" type="text/css" href="/css/cindex.css">
        <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.3/dist/jquery.min.js"></script>
        <script src="https://api.ixiaowai.cn/ylapi/index.php/?code=js"></script>
    </head>
    
    <body>
        <div class="header">
            <a href="/"><h1>Blog</h1></a>
        </div>

        <div class="topnav">
            <a href="/">首页</a>
            <a href="#1">测试页1</a>
            <a href="#2">测试页2</a>
            <a href="#3" style="float: right;">测试页3</a>
        </div>

        <div class="mainpage">
            <div class="column side">
                <div class="ylcard">
                    <h2>一言</h2>
                    <p><script>xiaowai();</script></p>
                </div>
            </div>
            <div class="column middle"></div>
            <div class="column side">
                <div id="playcard"></div>
            </div>
        </div>

        <div class="footer">
            <p>Developed by a___</p>
        </div>

        <script>
            $(function(){
                $.get("/blog/index.json", function(data){
                    for(let key in data)
                        $(".column.middle").prepend("<div class=\"card\"><a href=\"/blog/?pid=" + key + "\"><h2>" + data[key]["title"] + "</h2></a><p>" + data[key]["abstract"] + "</p></div>");
                });
            });
        </script>
    </body>
</html>
