<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <meta name="renderer" content="webkit">

    <body>
        <div class="flappybird" id="flappybird">

            </div>

            <div class="board" id="board">

                <div class="score" id="score"></div>
                <div class="bestscore" id="bestscore"></div>
            </div>
